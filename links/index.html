<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Benini Squad - Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/styles.css"/>
<link rel="stylesheet" href="../css/color-bends.css"/>
<link rel="stylesheet" href="../css/links.css"/>
</head>
<body class="links-page">
<div class="color-bends-container" id="links-color-bends" aria-hidden="true"></div>
<div class="links-page__glass-bg" aria-hidden="true"></div>
<div class="noise-overlay" aria-hidden="true"></div>

<main class="links-page__main">
  <header class="links-page__header">
    <p class="links-page__eyebrow">Benini Squad</p>
    <h1 class="links-page__title">
      Quanto mais <span class="links-page__accent">forte</span>,<br/>
      mais <span class="links-page__accent">feminina</span>.
    </h1>
    <p class="links-page__lead">Escolha como quer continuar.</p>
  </header>

  <nav class="links-page__actions" aria-label="Links principais">
    <a
      id="links-whatsapp"
      class="btn-primary btn-glass btn-glass--hero links-page__btn"
      href="https://wa.me/5511999999999?text=Oi%2C%20vim%20pelo%20link%20da%20Benini%20Squad."
      target="_blank"
      rel="noopener noreferrer"
    >
      <span class="btn-glass-glow-ring" aria-hidden="true">
        <svg class="btn-glass-glow-ring__svg" viewBox="0 0 100 32" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <linearGradient id="links-btn-stroke-gradient" gradientUnits="userSpaceOnUse" x1="50" y1="32" x2="50" y2="0">
              <stop offset="0%" stop-color="rgba(255, 252, 245, 0.98)"/>
              <stop offset="22%" stop-color="rgba(255, 255, 255, 0.42)"/>
              <stop offset="55%" stop-color="rgba(255, 255, 255, 0.14)"/>
              <stop offset="100%" stop-color="rgba(255, 255, 255, 0.22)"/>
            </linearGradient>
            <filter id="links-btn-stroke-glow" x="-30%" y="-40%" width="160%" height="180%" color-interpolation-filters="sRGB">
              <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <rect
            class="btn-glass-glow-ring__path"
            x="0.5"
            y="0.5"
            width="99"
            height="31"
            rx="15.5"
            ry="15.5"
            pathLength="1"
          />
        </svg>
      </span>
      <span class="btn-primary__label">Falar no WhatsApp</span>
      <span class="btn-primary__icon" aria-hidden="true">→</span>
    </a>
    <button
      type="button"
      id="links-site"
      class="btn-ghost links-page__btn links-page__btn--site"
      aria-expanded="false"
      aria-controls="links-rebrand-notice"
    >
      <span class="links-page__btn-label">Acessar o site</span>
      <span class="links-page__btn-arrow" aria-hidden="true">→</span>
    </button>
    <div class="links-page__rebrand-notice" id="links-rebrand-notice" hidden aria-live="polite">
      <p class="links-page__rebrand-msg">
        <span class="links-page__rebrand-line">Nosso rebranding</span>
        <span class="links-page__rebrand-line">sera lancada em breve!</span>
      </p>
      <p class="links-page__rebrand-sub">Faltam poucos dias para o inicio da contagem regressiva.</p>
    </div>
  </nav>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="../js/color-bends.js"></script>
<script src="../js/links-config.js"></script>
<script src="../js/links-split-text.js"></script>
<script src="../js/links-page.js"></script>
</body>
</html>
